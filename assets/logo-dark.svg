  <rect width="256" height="256" rx="44" ry="44" fill="#0B1220"/>
  <g stroke="#0F766E" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="128" y1="78" x2="78" y2="178"/>
    <line x1="128" y1="78" x2="178" y2="178"/>
    <line x1="78"  y1="178" x2="178" y2="178"/>
  </g>
  <circle cx="128" cy="78" r="20" fill="#0F766E"/>
  <circle cx="78"  cy="178" r="20" fill="#0F766E"/>
  <circle cx="178" cy="178" r="22" fill="#F59E0B"/>
</svg>
