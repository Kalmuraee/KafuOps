<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="KafuOps social card">
  <title>KafuOps — production debugging, in evidence-backed merge requests</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0F2A2A"/>
    </linearGradient>
    <style>
      .mono { font-family: 'JetBrains Mono','IBM Plex Mono','Fira Code',ui-monospace,monospace; }
      .sans { font-family: Inter,ui-sans-serif,system-ui,-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top-left mark -->
  <g transform="translate(80,80)">
    <rect width="128" height="128" rx="24" ry="24" fill="#0F766E"/>
    <g stroke="#F8FAFC" stroke-width="9" stroke-linecap="round" fill="none">
      <line x1="64" y1="34" x2="34" y2="94"/>
      <line x1="64" y1="34" x2="94" y2="94"/>
      <line x1="34" y1="94" x2="94" y2="94"/>
    </g>
    <circle cx="64" cy="34" r="12" fill="#F8FAFC"/>
    <circle cx="34" cy="94" r="12" fill="#F8FAFC"/>
    <circle cx="94" cy="94" r="13" fill="#F59E0B"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(240,108)">
    <text x="0" y="64" class="mono" font-size="80" font-weight="700" fill="#F8FAFC">kafu</text>
    <g transform="translate(228,4)">
      <rect width="208" height="86" rx="18" ry="18" fill="#F59E0B"/>
      <text x="28" y="62" class="mono" font-size="56" font-weight="700" fill="#0B1220">ops</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="80" y="320" class="sans" font-size="44" font-weight="600" fill="#F8FAFC">Turn backend incidents into</text>
  <text x="80" y="372" class="sans" font-size="44" font-weight="600" fill="#F8FAFC">evidence-backed merge requests.</text>

  <!-- Sub-tagline -->
  <text x="80" y="440" class="sans" font-size="22" fill="#94A3B8">Open source. Self-hostable. No continuous logs to the model.</text>

  <!-- Pipeline strip -->
  <g transform="translate(80,490)" class="mono" font-size="22" fill="#94A3B8">
    <text x="0" y="0">incident</text>
    <text x="160" y="0" fill="#475569">→</text>
    <text x="200" y="0">grounded context</text>
    <text x="450" y="0" fill="#475569">→</text>
    <text x="490" y="0">sandbox patch</text>
    <text x="720" y="0" fill="#475569">→</text>
    <text x="760" y="0" fill="#F59E0B">reviewable MR</text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1120" y="580" text-anchor="end" class="mono" font-size="20" fill="#475569">github.com/Kalmuraee/KafuOps</text>
</svg>
