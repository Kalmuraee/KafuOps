  <text x="410" y="22" fill="#7d8590" text-anchor="middle" font-size="12">kafuops — incident → fix</text>
  <text x="22" y="56" fill="#7d8590" xml:space="preserve">$ node test.js            # the bug, before KafuOps</text>
  <text x="22" y="78" fill="#f85149" xml:space="preserve">AssertionError: 20% off $100 should be $80   (got -1900)</text>
