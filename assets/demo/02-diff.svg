<svg xmlns="http://www.w3.org/2000/svg" width="820" height="254" viewBox="0 0 820 254" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14">
  <rect x="0.5" y="0.5" width="819" height="253" rx="12" fill="#0d1117" stroke="#21262d"/>
  <rect x="0.5" y="0.5" width="819" height="34" rx="12" fill="#161b22"/>
  <rect x="0.5" y="22" width="819" height="12" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#f85149"/><circle cx="40" cy="17" r="6" fill="#d29922"/><circle cx="60" cy="17" r="6" fill="#3fb950"/>
  <text x="410" y="22" fill="#7d8590" text-anchor="middle" font-size="12">the patch KafuOps generated</text>
  <text x="22" y="56" fill="#7d8590" xml:space="preserve">diff --git a/src/discount.js b/src/discount.js</text>
  <text x="22" y="78" fill="#79c0ff" xml:space="preserve">@@ -1,5 +1,5 @@</text>
  <text x="22" y="100" fill="#cdd6e4" xml:space="preserve"> function applyDiscount(price, percent) {</text>
  <text x="22" y="122" fill="#f85149" xml:space="preserve">-  return price - price * percent;</text>
  <text x="22" y="144" fill="#3fb950" xml:space="preserve">+  return price - price * (percent / 100);</text>
  <text x="22" y="166" fill="#cdd6e4" xml:space="preserve"> }</text>
  <text x="22" y="188" fill="#cdd6e4" xml:space="preserve"></text>
  <text x="22" y="210" fill="#7d8590" xml:space="preserve"># the model found the unit bug: percent is 0–100, not a fraction</text>
</svg>
