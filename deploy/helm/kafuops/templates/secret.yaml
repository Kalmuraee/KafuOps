{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kafuops-secrets
  labels:
    {{- include "kafuops.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  KAFUOPS_GIT_TOKEN: {{ .Values.secrets.gitToken | quote }}
  KAFUOPS_WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
{{- end }}
