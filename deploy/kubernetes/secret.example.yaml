# Copy to secret.yaml and fill in real values (or create via `kubectl create secret`).
# Never commit real secrets. At minimum set ONE LLM key and, for real MRs, a git token.
apiVersion: v1
kind: Secret
metadata:
  name: kafuops-secrets
  namespace: kafuops
type: Opaque
stringData:
  # One of these enables live analysis; absent → deterministic dry-run.
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  # Token used to clone the repo and open PRs/MRs (GitHub PAT / GitLab token).
  KAFUOPS_GIT_TOKEN: ""
  # HMAC/bearer secret for authenticated webhook intake (Sentry/Datadog/Alertmanager).
  KAFUOPS_WEBHOOK_SECRET: ""
