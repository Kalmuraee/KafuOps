version: 1
project:
  name: sample-app
  language: javascript
  framework: express
  service_name: sample-app
  default_branch: main
repo:
  provider: none
  default_branch: main
  mr:
    enabled: true
    auto_create: true
    auto_merge: false
    branch_prefix: kafuops/fix
runtime:
  mode: wrapper
  service_command: null
  log_sources:
    - type: stdout
observability:
  opentelemetry:
    enabled: false
    endpoint: http://localhost:4318
  logs:
    enabled: true
    ring_buffer:
      enabled: true
      max_age_seconds: 600
      max_bytes_per_service: 10485760
      include_before_error_seconds: 120
      include_after_error_seconds: 30
  webhooks:
    sentry: false
    datadog: false
    alertmanager: false
    custom: true
triggers:
  create_incident_when:
    - type: uncaught_exception
    - type: process_crash
    - type: repeated_stacktrace
      count: 3
      window_seconds: 120
llm:
  provider: openai
  trigger_mode: incident_only
  models:
    analysis: gpt-4o-mini
    patch: gpt-4o-mini
  structured_outputs: true
  max_context_files: 30
  max_log_excerpt_chars: 12000
  max_file_chars: 8000
privacy:
  redact_before_storage: true
  redact_before_llm: true
  audit_model_context: true
  send_full_logs_to_llm: false
  send_full_repo_to_llm: false
  require_allowlist_for_sensitive_paths: true
redaction:
  enabled: true
  patterns: []
  json_fields:
    - password
    - token
    - secret
    - authorization
    - cookie
    - session
    - access_token
    - refresh_token
    - credit_card
file_policy:
  deny:
    - .env
    - .env.*
    - secrets/**
    - private_keys/**
    - "*.pem"
    - "*.key"
    - credentials.json
sandbox:
  type: local
  image: node:22
  install_command: npm ci
  test_command: npm test
  targeted_test_command: npm test -- {test_file}
  working_dir: .kafuops/sandbox
  timeout_seconds: 300
policies:
  model_calls:
    require_incident: true
    require_redaction: true
    audit_every_call: true
  merge_requests:
    auto_create: true
    auto_merge: false
    require_tests_or_explanation: true
  confidence:
    open_mr_if_score_at_least: 70
    require_human_approval_if_below: 85
  never_modify:
    - .env
    - .env.*
    - secrets/**
    - private_keys/**
    - "*.pem"
    - "*.key"
  require_approval_to_modify:
    - src/auth/**
    - src/security/**
    - src/payments/**
    - migrations/**
    - infra/**
  blast_radius:
    block_high_risk_auto_mr: true
    require_approval_for:
      - auth
      - payments
      - migrations
      - permissions
      - infrastructure
noise_control:
  dedupe_window_seconds: 900
  max_incidents_per_service_per_hour: 5
  ignore:
    - route: GET /metrics
    - route: GET /healthz
    - environment: development
server:
  host: 127.0.0.1
  port: 7878
  webhook_secret_env: KAFUOPS_WEBHOOK_SECRET
