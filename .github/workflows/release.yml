name: Release

# Publishes kafuops to npm AND creates a GitHub Release when a version tag is
# pushed (e.g. `git tag v0.4.0 && git push origin v0.4.0`).
#
# Auth = npm Trusted Publishing (OIDC) — NO token/secret needed. The job has
# `id-token: write`; npm (>= 11.5.1) exchanges the GitHub OIDC token for a
# short-lived publish token. This satisfies the package's "require 2FA" policy
# (which rejects automation tokens) and produces provenance automatically.
#
# One-time setup on npmjs.com → package `kafuops` → Settings → Trusted Publisher:
#   Provider: GitHub Actions · Org/repo: Kalmuraee/KafuOps · Workflow: release.yml

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build + test
        run: |
          npm run build
          npm test

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing kafuops@$PKG"

      - name: Publish to npm (Trusted Publishing / OIDC — no token)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          printf '%s\n' \
            "Published to npm: https://www.npmjs.com/package/kafuops/v/$VERSION" \
            "" \
            '```bash' \
            "npm install -g kafuops@$VERSION" \
            '```' > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "kafuops $GITHUB_REF_NAME" \
            --generate-notes \
            --notes-file release-notes.md
