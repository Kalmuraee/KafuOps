name: Release

# On a version tag (`git tag v0.4.0 && git push origin v0.4.0`) this:
#   1. publishes kafuops to npm + creates a GitHub Release  (job: publish)
#   2. builds + pushes a multi-arch Docker image            (job: docker)
#
# npm auth = Trusted Publishing (OIDC) — NO token/secret. The job has
# `id-token: write`; npm (>= 11.5.1) exchanges the GitHub OIDC token for a
# short-lived publish token. One-time setup on npmjs.com → package `kafuops` →
# Settings → Trusted Publisher: GitHub Actions · Kalmuraee/KafuOps · release.yml
#
# Docker: GHCR (ghcr.io/kalmuraee/kafuops) pushes with the built-in GITHUB_TOKEN
# (no setup). Docker Hub (docker.io/kalmuraee/kafuops) pushes too IF you add repo
# secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN — otherwise it's skipped (GHCR
# still publishes). After the first GHCR push, set the package to Public:
# github.com/users/Kalmuraee/packages/container/kafuops/settings.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build + test
        run: |
          npm run build
          npm test

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing kafuops@$PKG"

      - name: Publish to npm (Trusted Publishing / OIDC — no token)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          printf '%s\n' \
            "Published to npm: https://www.npmjs.com/package/kafuops/v/$VERSION" \
            "" \
            '```bash' \
            "npm install -g kafuops@$VERSION" \
            "# or run the container:" \
            "docker run --rm ghcr.io/kalmuraee/kafuops:$VERSION --help" \
            '```' > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "kafuops $GITHUB_REF_NAME" \
            --generate-notes \
            --notes-file release-notes.md

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via the built-in GITHUB_TOKEN
      id-token: write # build provenance attestation
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Docker Hub credentials
        id: dh
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_TOKEN not set — pushing to GHCR only. Add repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN to also push to Docker Hub."
          fi

      - name: Log in to Docker Hub
        if: steps.dh.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/kalmuraee/kafuops
            name=docker.io/kalmuraee/kafuops,enable=${{ steps.dh.outputs.enabled }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=KafuOps
            org.opencontainers.image.description=Open-source, self-hostable AI production-debugging agent that turns backend incidents into evidence-backed merge requests.
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.url=https://kalmuraee.github.io/KafuOps/

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
