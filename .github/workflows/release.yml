name: Release

# Publishes kafuops to npm when a version tag is pushed (e.g. `git tag v0.3.0 && git push origin v0.3.0`).
# Requires an `NPM_TOKEN` repository secret: a granular/automation token with publish rights.
# Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + test
        run: |
          npm run build
          npm test

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing kafuops@$PKG"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
